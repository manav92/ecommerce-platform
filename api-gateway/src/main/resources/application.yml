server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: catalog-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/products/**,/api/v1/admin/products/**,/api/v1/admin/product-imports/**
        - id: search-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/search/**
#        - id: inventory-service
#          uri: http://localhost:8084
#          predicates:
#            - Path=/api/v1/inventory/**
#        - id: cart-service
#          uri: http://localhost:8085
#          predicates:
#            - Path=/api/v1/cart/**
#        - id: order-service
#          uri: http://localhost:8086
#          predicates:
#            - Path=/api/v1/orders/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
