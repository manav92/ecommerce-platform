server:
  port: 8082

spring:
  application:
    name: product-import-worker
  datasource:
    url: jdbc:postgresql://localhost:5432/catalogdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092

import:
  poll-interval-ms: 15000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
